<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI & CMAX 计算器</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 4px;
            border-left: 4px solid #4CAF50;
        }
        .result h3 {
            margin-top: 0;
            color: #333;
        }
        .formula-note {
            font-size: 12px;
            color: #888;
            margin-top: 30px;
            border-top: 1px dashed #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BMI & CMAX 计算器</h1>
        <form id="calcForm">
            <div class="form-group">
                <label for="height">身高 (C) / cm</label>
                <input type="number" id="height" step="0.1" placeholder="请输入身高（厘米）" required>
            </div>
            <div class="form-group">
                <label for="weight">体重 (B) / kg</label>
                <input type="number" id="weight" step="0.1" placeholder="请输入体重（公斤）" required>
            </div>
            <div class="form-group">
                <label for="gender">性别 (D)</label>
                <select id="gender" required>
                    <option value="">-- 请选择 --</option>
                    <option value="M">男 (M)</option>
                    <option value="F">女 (F)</option>
                </select>
            </div>
            <button type="submit">计算</button>
        </form>

        <div class="result" id="result" style="display: none;">
            <h3>计算结果</h3>
            <p><strong>BMI 指数：</strong> <span id="bmiValue"></span> (<span id="bmiCategory"></span>)</p>
            <p><strong>CMAX 值：</strong> <span id="cmaxValue"></span></p>
        </div>

        <div class="formula-note">
            <p><strong>使用公式：</strong></p>
            <p>BMI = 体重(kg) / (身高(m)²)</p>
            <p>CMAX = IF(D="M", 2.75*B / (0.3669*(C/100)³ + B*0.03219 + 0.6041), IF(D="F", 2.75*B / (0.3561*(C/100)³ + B*0.03308 + 0.1833), ""))</p>
        </div>
    </div>

    <script>
        document.getElementById('calcForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 阻止表单默认提交

            // 获取输入值
            const height = parseFloat(document.getElementById('height').value) / 100; // 转换为米
            const weight = parseFloat(document.getElementById('weight').value);
            const gender = document.getElementById('gender').value;

            // 计算 BMI
            const bmi = weight / (height * height);
            let bmiCategory;
            if (bmi < 18.5) {
                bmiCategory = '偏瘦';
            } else if (bmi < 24) {
                bmiCategory = '正常';
            } else if (bmi < 28) {
                bmiCategory = '超重';
            } else {
                bmiCategory = '肥胖';
            }

            // 计算 CMAX (根据你的Excel公式转换)
            let cmax;
            const height_cm = height * 100; // 转换回厘米用于公式
            if (gender === 'M') {
                cmax = (2.75 * weight) / (0.3669 * Math.pow(height, 3) + (weight * 0.03219) + 0.6041);
            } else if (gender === 'F') {
                cmax = (2.75 * weight) / (0.3561 * Math.pow(height, 3) + (weight * 0.03308) + 0.1833);
            } else {
                cmax = 'N/A';
            }

            // 显示结果
            document.getElementById('bmiValue').textContent = bmi.toFixed(2);
            document.getElementById('bmiCategory').textContent = bmiCategory;
            document.getElementById('cmaxValue').textContent = (typeof cmax === 'number') ? cmax.toFixed(4) : cmax;
            document.getElementById('result').style.display = 'block';
        });
    </script>
</body>
</html>
